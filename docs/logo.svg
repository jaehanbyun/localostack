<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <!-- Mark: exploded isometric stack -->
  <g transform="translate(0, 4) scale(1.5)">
    <!-- Top layer — cyan -->
    <polygon points="18,3 29,6 18,9 7,6" fill="#22D3EE"/>
    <!-- Middle layer — violet, offset left -->
    <polygon points="14,13 25,16 14,19 3,16" fill="#8B5CF6"/>
    <!-- Bottom layer — pink, offset right -->
    <polygon points="16,23 27,26 16,29 5,26" fill="#EC4899"/>
  </g>

  <!-- Wordmark -->
  <text x="58" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" font-size="13" font-weight="700" fill="#c9d1d9" letter-spacing="0.5">Local</text>
  <text x="97" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" font-size="13" font-weight="700" fill="#22D3EE" letter-spacing="0.5">O</text>
  <text x="107" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" font-size="13" font-weight="700" fill="#c9d1d9" letter-spacing="0.5">Stack</text>
  <text x="58" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" font-size="9" fill="#8b949e" letter-spacing="2">LOCAL OPENSTACK</text>
</svg>
